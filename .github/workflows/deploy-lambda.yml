name: Deploy Lambda

on:
  push:
    branches:
      - main       # → prod
      - develop    # → staging
    paths:
      - "lambda/**"
      - ".github/workflows/deploy-lambda.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]

env:
  AWS_REGION: us-east-1

jobs:
  build-and-upload:
    name: Build & Upload artifact
    runs-on: ubuntu-latest
    outputs:
      s3_key: ${{ steps.upload.outputs.s3_key }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lambda/package-lock.json

      - name: Install production dependencies
        working-directory: lambda
        run: npm ci --omit=dev

      - name: Package Lambda
        run: |
          bash scripts/package-lambda.sh
          echo "Created lambda.zip: $(du -sh lambda.zip)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact to S3
        id: upload
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          S3_KEY="lambda/inframind-api-${{ github.sha }}.zip"
          aws s3 cp lambda.zip "s3://inframind-ai-${ENV}-artifacts/${S3_KEY}"
          echo "s3_key=${S3_KEY}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ${{ needs.build-and-upload.outputs.environment }}
    needs: build-and-upload
    runs-on: ubuntu-latest
    environment: ${{ needs.build-and-upload.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="envs/${{ needs.build-and-upload.outputs.environment }}/backend.tfvars"

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: |
          terraform apply \
            -var-file="envs/${{ needs.build-and-upload.outputs.environment }}/terraform.tfvars" \
            -var="lambda_artifact_s3_key=${{ needs.build-and-upload.outputs.s3_key }}" \
            -auto-approve

      - name: Update Lambda code
        run: |
          ENV="${{ needs.build-and-upload.outputs.environment }}"
          FUNCTION_NAME="inframind-ai-${ENV}-api"
          aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --s3-bucket "inframind-ai-${ENV}-artifacts" \
            --s3-key "${{ needs.build-and-upload.outputs.s3_key }}" \
            --publish

      - name: Wait for Lambda update
        run: |
          ENV="${{ needs.build-and-upload.outputs.environment }}"
          FUNCTION_NAME="inframind-ai-${ENV}-api"
          aws lambda wait function-updated --function-name "${FUNCTION_NAME}"

      - name: Smoke test
        run: |
          API_URL=$(cd infrastructure/terraform && terraform output -raw api_gateway_url)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health")
          if [ "${STATUS}" != "200" ]; then
            echo "Smoke test failed – HTTP ${STATUS}"
            exit 1
          fi
          echo "Smoke test passed – HTTP ${STATUS}"
