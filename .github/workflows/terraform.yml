name: Terraform Plan / Apply

on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: ["main", "develop"]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan' || 'apply') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "action=apply" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "action=apply" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "action=plan" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="envs/${{ steps.env.outputs.environment }}/backend.tfvars"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="envs/${{ steps.env.outputs.environment }}/terraform.tfvars" \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/terraform/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan – \`${{ steps.env.outputs.environment }}\`\n<details><summary>Show Plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`
            });

      - name: Terraform Apply
        if: steps.env.outputs.action == 'apply'
        run: |
          terraform apply \
            -var-file="envs/${{ steps.env.outputs.environment }}/terraform.tfvars" \
            -auto-approve

      - name: Terraform Destroy
        if: steps.env.outputs.action == 'destroy'
        run: |
          terraform destroy \
            -var-file="envs/${{ steps.env.outputs.environment }}/terraform.tfvars" \
            -auto-approve
